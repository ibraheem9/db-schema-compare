<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Compare - MySQL Schema Comparator</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234361ee' stroke-width='2'><ellipse cx='12' cy='5' rx='9' ry='3'/><path d='M21 12c0 1.66-4 3-9 3s-9-1.34-9-3'/><path d='M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5'/></svg>">
</head>
<body>

    <!-- Loading Spinner -->
    <div class="spinner-overlay" id="spinner">
        <div class="spinner"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"/>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
            DB Compare
        </a>
        <div class="navbar-actions">
            <button class="theme-toggle" id="themeToggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                Dark Mode
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Connection Form -->
        <div class="card fade-in">
            <div class="card-header">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                Database Connection Settings
            </div>
            <div class="card-body">
                <form id="compareForm">
                    <!-- Database A -->
                    <div class="form-section">
                        <div class="db-label">
                            <span class="dot dot-a"></span>
                            Database A (Source)
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="host1">Host</label>
                                <input type="text" id="host1" name="host1" value="localhost" required placeholder="e.g. localhost">
                            </div>
                            <div class="form-group">
                                <label for="port1">Port</label>
                                <input type="number" id="port1" name="port1" value="3306" placeholder="3306">
                            </div>
                            <div class="form-group">
                                <label for="user1">Username</label>
                                <input type="text" id="user1" name="user1" required placeholder="e.g. root">
                            </div>
                            <div class="form-group">
                                <label for="pass1">Password</label>
                                <input type="password" id="pass1" name="pass1" placeholder="Enter password">
                            </div>
                            <div class="form-group">
                                <label for="name1">Database Name</label>
                                <input type="text" id="name1" name="name1" required placeholder="e.g. production_db">
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div style="border-top: 1px dashed var(--border-color); margin: 20px 0;"></div>

                    <!-- Database B -->
                    <div class="form-section">
                        <div class="db-label">
                            <span class="dot dot-b"></span>
                            Database B (Target)
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="host2">Host</label>
                                <input type="text" id="host2" name="host2" value="localhost" required placeholder="e.g. localhost">
                            </div>
                            <div class="form-group">
                                <label for="port2">Port</label>
                                <input type="number" id="port2" name="port2" value="3306" placeholder="3306">
                            </div>
                            <div class="form-group">
                                <label for="user2">Username</label>
                                <input type="text" id="user2" name="user2" required placeholder="e.g. root">
                            </div>
                            <div class="form-group">
                                <label for="pass2">Password</label>
                                <input type="password" id="pass2" name="pass2" placeholder="Enter password">
                            </div>
                            <div class="form-group">
                                <label for="name2">Database Name</label>
                                <input type="text" id="name2" name="name2" required placeholder="e.g. staging_db">
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" id="compareBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                            Compare Databases
                        </button>
                        <button type="button" class="btn btn-outline" id="clearBtn">
                            Clear Results
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Section (populated by JS) -->
        <div id="resultsSection" style="display:none;"></div>

        <!-- Footer -->
        <div class="footer">
            DB Compare &mdash; MySQL Schema Comparison Tool &mdash; v1.0
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
